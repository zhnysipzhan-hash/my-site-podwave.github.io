{% extends "base.html" %}
{% block title %}Кіру{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4"><i class="bi bi-box-arrow-in-right"></i> Жүйеге кіру</h2>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Пайдаланушы аты</label>
                            <input type="text" name="username" class="form-control" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Құпия сөз</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">Кіру</button>
                        <p class="text-center text-muted mb-0">
                            Аккаунтыңыз жоқ па? <a href="{{ url_for('register') }}">Тіркелу</a>
                        </p>
                    </form>
                    <hr>
                    <small class="text-muted d-block text-center">
                        Тест: admin/admin123, manager/manager123, moderator/mod123, speaker/speaker123
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
