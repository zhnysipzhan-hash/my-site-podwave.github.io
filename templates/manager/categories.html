{% extends "base.html" %}
{% block title %}Санаттар{% endblock %}

{% block content %}
<div class="container py-5">
    <h1 class="mb-4"><i class="bi bi-tags"></i> Санаттарды басқару</h1>

    <div class="card shadow-sm border-0 mb-4">
        <div class="card-header bg-white"><strong>Жаңа санат қосу</strong></div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('manager_category_add') }}" class="row g-3">
                <div class="col-md-4">
                    <input type="text" name="name" class="form-control" placeholder="Санат атауы" required>
                </div>
                <div class="col-md-6">
                    <input type="text" name="description" class="form-control" placeholder="Сипаттама">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">Қосу</button>
                </div>
            </form>
        </div>
    </div>

    <div class="row g-3">
        {% for cat in categories %}
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <form method="POST" action="{{ url_for('manager_category_edit', cat_id=cat.id) }}">
                        <div class="mb-2">
                            <input type="text" name="name" class="form-control" value="{{ cat.name }}" required>
                        </div>
                        <div class="mb-2">
                            <input type="text" name="description" class="form-control" value="{{ cat.description or '' }}">
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-sm btn-outline-primary">Сақтау</button>
                            <button type="submit" formaction="{{ url_for('manager_category_delete', cat_id=cat.id) }}"
                                    class="btn btn-sm btn-outline-danger" onclick="return confirm('Өшіруді растайсыз ба?')">Өшіру</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
