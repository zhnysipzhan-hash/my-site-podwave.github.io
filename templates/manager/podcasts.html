{% extends "base.html" %}
{% block title %}Подкасттарды басқару{% endblock %}

{% block content %}
<div class="container py-5">
    <h1 class="mb-4"><i class="bi bi-collection-play"></i> Подкаст арналарын басқару</h1>

    <div class="card shadow-sm border-0 mb-4">
        <div class="card-header bg-white"><strong>Жаңа подкаст қосу</strong></div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('manager_podcast_add') }}" class="row g-3">
                <div class="col-md-3">
                    <input type="text" name="title" class="form-control" placeholder="Атау" required>
                </div>
                <div class="col-md-3">
                    <input type="text" name="description" class="form-control" placeholder="Сипаттама">
                </div>
                <div class="col-md-2">
                    <select name="category_id" class="form-select">
                        <option value="">Санат</option>
                        {% for c in categories %}
                        <option value="{{ c.id }}">{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-2">
                    <select name="author_id" class="form-select" required>
                        <option value="">Автор</option>
                        {% for e in employees %}
                        <option value="{{ e.id }}">{{ e.username }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">Қосу</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr><th>Атау</th><th>Санат</th><th>Автор</th><th>Әрекеттер</th></tr>
                </thead>
                <tbody>
                    {% for p in podcasts %}
                    <tr>
                        <td>
                            <form method="POST" action="{{ url_for('manager_podcast_edit', podcast_id=p.id) }}" class="row g-1">
                                <div class="col-12"><input name="title" class="form-control form-control-sm" value="{{ p.title }}"></div>
                                <div class="col-12"><input name="description" class="form-control form-control-sm" value="{{ p.description or '' }}" placeholder="Сипаттама"></div>
                        </td>
                        <td>
                                <select name="category_id" class="form-select form-select-sm">
                                    <option value="">—</option>
                                    {% for c in categories %}
                                    <option value="{{ c.id }}" {% if p.category_id == c.id %}selected{% endif %}>{{ c.name }}</option>
                                    {% endfor %}
                                </select>
                        </td>
                        <td>{{ p.author_name }}</td>
                        <td>
                                <button type="submit" class="btn btn-sm btn-outline-primary"><i class="bi bi-check"></i></button>
                            </form>
                            <form method="POST" action="{{ url_for('manager_podcast_delete', podcast_id=p.id) }}" class="d-inline" onsubmit="return confirm('Өшіруді растайсыз ба?')">
                                <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    {% else %}
                    <tr><td colspan="4" class="text-center text-muted">Подкасттар жоқ</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
